# Build Phoenix KSUN v3.0.0 / SUSFS v1.5.5

name: Build Phoenix KSUN v3.0.0 / SUSFS v1.5.9

on:
  workflow_dispatch:
    inputs:
      adb_serial:
        description: 'ADB serial of the device (e.g. 5b389e4c)'
        required: true
        type: string
      upload_target:
        description: 'Where to upload artifacts after build'
        required: false
        default: 'direct'
        type: choice
        options:
          - direct
          - gdrive

env:
  PROJECT_ROOT: projects/btc/ff

jobs:
  host-prep:
    runs-on: ubuntu-latest
    outputs:
      toolchain_sha: ${{ steps.tool.outputs.sha256 }}
    steps:
      - name: Checkout (monorepo root)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch Android clang r416183b
        id: tool
        run: |
          set -euo pipefail
          # Use crdroidandroid mirror: same revision (r416183b), branch 11.0
          # Original https://android.googlesource.com/.../clang-r416183b.tar.gz
          # returned 400 after Google's archive path changed.
          URL="https://codeload.github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-r416183b/tar.gz/refs/heads/11.0"
          EXPECTED="d4d1d97e1b49839ebeb77681c9faaa3cf163737c529121f1aa9bc4eae42e144f"
          mkdir -p "$PROJECT_ROOT/build/toolchain"
          curl -fL --retry 5 --retry-delay 5 --retry-max-time 900 "$URL" -o clang.tar.gz
          GOT=$(sha256sum clang.tar.gz | cut -d' ' -f1)
          if [[ "$GOT" != "$EXPECTED" ]]; then
            echo "::error::sha256 mismatch: got $GOT, expected $EXPECTED" >&2
            exit 1
          fi
          echo "$EXPECTED" > "$PROJECT_ROOT/toolchain.sha256"
          echo "sha256=$EXPECTED" >> "$GITHUB_OUTPUT"
          tar -xzf clang.tar.gz --strip-components=1 -C "$PROJECT_ROOT/build/toolchain"
          rm -f clang.tar.gz
          # Smoke check: the absolute Linux-x86 clang-12 ELF must exist
          test -x "$PROJECT_ROOT/build/toolchain/bin/clang-12"
          "$PROJECT_ROOT/build/toolchain/bin/clang-12" --version | head -1

      - name: Cache toolchain (keyed on SHA)
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_ROOT }}/build/toolchain
          key: toolchain-${{ steps.tool.outputs.sha256 }}
          restore-keys: toolchain-

      - name: Install host build deps
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git rsync python3 python3-venv \
            libelf-dev libssl-dev liblz4-tool device-tree-compiler \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu \
            cpio lz4 zip unzip bc patch
          # mkbootimg/unmkbootimg intentionally NOT pulled here. The CI emits
          # Image.gz-dtb only; boot.img repack happens on the operator's host
          # via magiskboot (release-checklist Â§F). Downloading remote mkbootimg
          # binaries proved unreliable because mirrors are being archived.

  source-prep:
    needs: host-prep
    runs-on: ubuntu-latest
    outputs:
      ksud_version: ${{ steps.inspect.outputs.ksud_version }}
      susfs_version: ${{ steps.inspect.outputs.susfs_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore cached toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_ROOT }}/build/toolchain
          key: toolchain-${{ needs.host-prep.outputs.toolchain_sha }}
          restore-keys: toolchain-

      - name: Fetch KBapna base at v2.2_Unholy_SUSFS
        run: |
          set -euo pipefail
          mkdir -p "$PROJECT_ROOT/build/sources"
          git clone --filter=blob:none --branch v2.2_Unholy_SUSFS \
            https://github.com/KBapna/Unholy_Phoenix_Redmi_K30_Kernel \
            "$PROJECT_ROOT/build/sources/KBapna"
          cd "$PROJECT_ROOT/build/sources/KBapna"
          git submodule update --init --recursive --depth 1 || true

      - name: Overlay rifsxd KernelSU-Next v3.0.0 via upstream setup.sh
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          # The canonical non-GKI flow is upstream setup.sh: it clones
          # https://github.com/KernelSU-Next/KernelSU-Next at the requested
          # tag, pins v3.0.0, and wires the Kconfig source directive + Makefile
          # obj-y that drivers/kernelsu/ needs. setup.sh refuses to run if
          # ./KernelSU-Next already exists; clear it.
          if [[ -d KernelSU-Next ]]; then
            rm -rf KernelSU-Next
          fi
          curl -fsSL \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/v3.0.0/kernel/setup.sh" \
            -o /tmp/ksun-setup.sh
          bash /tmp/ksun-setup.sh v3.0.0
          rm -f /tmp/ksun-setup.sh

      - name: Overlay SUSFS v1.5.5 (kernel-4.14 branch) into kernel tree
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          # The 4.14 NON-GKI branch is the only one that ships patches KBapna's
          # v2.2 tree expects. v1.5.5 is the same version the device already
          # runs; we are rebuilding with current KSUN + same SUSFS so the
          # userspace ksud (v3.2.0) stays ABI-stable.
          curl -fL --retry 3 --retry-max-time 120 \
            "https://gitlab.com/simonpunk/susfs4ksu/-/archive/kernel-4.14/susfs4ksu-kernel-4.14.tar.gz" \
            -o /tmp/susfs.tar.gz
          mkdir -p /tmp/susfs
          tar -xzf /tmp/susfs.tar.gz -C /tmp/susfs --strip-components=1
          # Verified via GitLab REST that kernel-4.14 path layout is:
          #   kernel_patches/fs/susfs.c            (and sus_su.c, no .h)
          #   kernel_patches/fs/50_add_susfs_in_kernel-4.14.patch
          #   kernel_patches/include/linux/susfs.h   (and susfs_def.h, sus_su.h)
          #   kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch
          # So the kernel-tree copy plan is C source files -> fs/, headers -> include/linux/.
          cp /tmp/susfs/kernel_patches/fs/susfs.c                       ./fs/
          cp /tmp/susfs/kernel_patches/fs/sus_su.c                      ./fs/
          cp /tmp/susfs/kernel_patches/include/linux/susfs.h            ./include/linux/
          cp /tmp/susfs/kernel_patches/include/linux/susfs_def.h        ./include/linux/
          cp /tmp/susfs/kernel_patches/include/linux/sus_su.h           ./include/linux/
          # Apply SUSFSâ†”KSUN glue patch into the integrated KSUN tree
          if [[ -f /tmp/susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ]]; then
            cp /tmp/susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch \
              ./KernelSU-Next/
            ( cd ./KernelSU-Next && \
              patch --dry-run -p1 < 10_enable_susfs_for_ksu.patch >/dev/null && \
              patch -p1 < 10_enable_susfs_for_ksu.patch ) || true
            rm -f ./KernelSU-Next/10_enable_susfs_for_ksu.patch
          fi
          # Apply the upstream 50_add_susfs_in_kernel-4.14.patch into the tree
          # (covers fs/dcache.c, fs/namei.c, fs/namespace.c, fs/proc/*.c,
          # fs/stat.c, fs/statfs.c, kernel/kallsyms.c, kernel/sys.c, etc).
          # KBapna's branch already has SOME of these hooks baked in (verified:
          # fs/Makefile obj-y line + kernel/sys.c spoof_uname hook present).
          # --forward makes 'patch' idempotent: it skips already-applied hunks.
          cp /tmp/susfs/kernel_patches/fs/50_add_susfs_in_kernel-4.14.patch ./50_add_susfs_in_kernel-4.14.upstream.patch
          patch --forward -p1 -d . < 50_add_susfs_in_kernel-4.14.upstream.patch || \
            echo "WARN: kernel-side SUSFS patch was not fully applicable; tree may have prior SUSFS diff."
          # Drop the upstream patch + any .orig backups so defconfig/prepare step
          # never sees them as inputs in arch/arm64 configs.
          rm -f 50_add_susfs_in_kernel-4.14.upstream.patch
          # git would normally purge .orig; we don't have a git checkout here
          # (the runner uses --filter=blob:none), so just rm them directly.
          find . -name '*.orig' -type f -delete 2>/dev/null || true
          rm -rf /tmp/susfs /tmp/susfs.tar.gz

      - name: Verify versions
        id: inspect
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          KSU_TAG=$(git -C KernelSU-Next describe --tags --always 2>/dev/null || echo v3.0.0)
          # Read the SUSFS_VERSION macro out of the freshly copied susfs.h
          SUSFS_VER=$(grep -E '^#define[[:space:]]+SUSFS_VERSION' include/linux/susfs.h 2>/dev/null \
                      | sed -E 's/.*"([^"]+)".*/\1/' | head -1)
          SUSFS_VER="${SUSFS_VER:-v1.5.5}"
          echo "ksud_version=$KSU_TAG" >> "$GITHUB_OUTPUT"
          echo "susfs_version=$SUSFS_VER" >> "$GITHUB_OUTPUT"

  build:
    needs: [host-prep, source-prep]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore cached toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_ROOT }}/build/toolchain
          key: toolchain-${{ needs.host-prep.outputs.toolchain_sha }}
          restore-keys: toolchain-

      - name: Export build environment + SUSFS fragment
        run: |
          set -euo pipefail
          {
            echo "PATH=$PWD/$PROJECT_ROOT/build/toolchain/bin:$PWD/$PROJECT_ROOT/build/bin:$PATH"
            echo "ARCH=arm64"
            echo "SUBARCH=arm64"
            echo "CROSS_COMPILE=aarch64-linux-gnu-"
            echo "CC=clang"
            echo "LD=ld.lld"
            echo "CLANG_TRIPLE=aarch64-linux-gnu-"
          } >> "$GITHUB_ENV"
          cat "$PROJECT_ROOT/build/config/phoenix_v2.3.fragment" \
            >> "$PROJECT_ROOT/build/sources/KBapna/arch/arm64/configs/vendor/phoenix_defconfig"

      - name: make defconfig
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: make ARCH=arm64 vendor/phoenix_defconfig

      - name: make prepare
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: make ARCH=arm64 prepare

      - name: Compile kernel + dtbs
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: |
          set -euo pipefail
          make -j"$(nproc)" ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            Image.gz-dtb dtbs \
            |& tee build/kernel-build.log

      - name: Extract embedded kernel config
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: |
          set -euo pipefail
          mkdir -p build/out
          scripts/extract-ikconfig.sh arch/arm64/boot/Image.gz-dtb \
            > build/out/embedded.config || true

      - name: Run manifest scan
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        env:
          KSU_SOURCE_TAG: ${{ needs.source-prep.outputs.ksud_version }}
          SUSFS_SOURCE_VERSION: ${{ needs.source-prep.outputs.susfs_version }}
        run: bash "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/manifest/report.sh" "$PWD"

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-${{ github.run_number }}
          path: ${{ env.PROJECT_ROOT }}/build/sources/KBapna/arch/arm64/boot/Image.gz-dtb
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-log-${{ github.run_number }}
          path: ${{ env.PROJECT_ROOT }}/build/sources/KBapna/build/kernel-build.log
          retention-days: 14

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest-${{ github.run_number }}
          path: ${{ env.PROJECT_ROOT }}/build/sources/KBapna/build/manifest/MANIFEST.json
          retention-days: 30

  adb-pull:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.upload_target == 'gdrive' }}
    steps:
      - name: Wait for ADB connectivity
        run: |
          set -euo pipefail
          SERIAL="${{ github.event.inputs.adb_serial }}"
          # The ubuntu-latest runner does NOT have ADB access to your device.
          # This job exists as a placeholder for a self-hosted runner.
          # On your LAN, trigger the same workflow on a runner that has ADB.
          echo "NOTE: ADB pull requires a self-hosted Linux runner on the same LAN as the device."
          echo "Current runner: ${{ runner.name }} (${{ runner.os }})"
          exit 0
