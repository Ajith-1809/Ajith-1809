# Build Phoenix KSUN v3.0.0 / SUSFS v1.5.5

name: Build Phoenix KSUN v3.0.0 / SUSFS v1.5.5

on:
  workflow_dispatch:
    inputs:
      adb_serial:
        description: 'ADB serial of the device (e.g. 5b389e4c)'
        required: true
        type: string
      upload_target:
        description: 'Where to upload artifacts after build'
        required: false
        default: 'direct'
        type: choice
        options:
          - direct
          - gdrive

env:
  PROJECT_ROOT: projects/btc/ff

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install host build deps
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git rsync python3 python3-venv \
            libelf-dev libssl-dev liblz4-tool device-tree-compiler \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            cpio lz4 zip unzip bc patch

      - name: Fetch KBapna base at Unholy_KSUN+SUSFS (download ZIP)
        run: |
          set -euo pipefail
          # Download KBapna source as ZIP (much faster than git clone of 1.7 GB repo)
          curl -fL --retry 3 \
            "https://github.com/KBapna/Unholy_Phoenix_Redmi_K30_Kernel/archive/refs/heads/Unholy_KSUN+SUSFS.zip" \
            -o /tmp/kbapna-src.zip
          mkdir -p /tmp/kbapna-extracted
          echo "Extracting ZIP archive ..."
          unzip -qo /tmp/kbapna-src.zip -d /tmp/kbapna-extracted
          # The single top-level directory name from a GitHub branch ZIP varies
          # (especially with + in branch names). Resolve it dynamically.
          extracted_dir=$(find /tmp/kbapna-extracted -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -z "$extracted_dir" ]; then
            echo "::error::No directory found in extracted ZIP"
            ls -la /tmp/kbapna-extracted/
            exit 1
          fi
          echo "Extracted: $extracted_dir"
          mkdir -p "$PROJECT_ROOT/build/sources/KBapna"
          shopt -s dotglob
          mv "$extracted_dir"/* "$PROJECT_ROOT/build/sources/KBapna"/
          shopt -u dotglob
          rm -f /tmp/kbapna-src.zip
          rm -rf /tmp/kbapna-extracted
          cd "$PROJECT_ROOT/build/sources/KBapna"
          echo "=== arch/arm64/configs ==="
          ls -l arch/arm64/configs
          echo "=== phoenix_defconfig present: $([ -f arch/arm64/configs/phoenix_defconfig ] && echo YES || echo NO) ==="
          test -f arch/arm64/configs/phoenix_defconfig || {
            echo "::error::kbapna clone is missing arch/arm64/configs/phoenix_defconfig"
            exit 1
          }

      - name: Overlay rifsxd KernelSU-Next v3.0.0 via upstream setup.sh
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          # The canonical non-GKI flow is upstream setup.sh: it clones
          # https://github.com/KernelSU-Next/KernelSU-Next at the requested
          # tag, pins v3.0.0, and wires the Kconfig source directive + Makefile
          # obj-y that drivers/kernelsu/ needs. setup.sh refuses to run if
          # ./KernelSU-Next already exists; clear it.
          if [[ -d KernelSU-Next ]]; then
            rm -rf KernelSU-Next
          fi
          curl -fsSL \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/v3.0.0/kernel/setup.sh" \
            -o /tmp/ksun-setup.sh
          bash /tmp/ksun-setup.sh v3.0.0
          rm -f /tmp/ksun-setup.sh

      - name: Overlay SUSFS v1.5.5 (kernel-4.14 branch) into kernel tree
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          # The 4.14 NON-GKI branch is the only one that ships patches KBapna's
          # tree expects. v1.5.5 is the same version the device already runs;
          # we are rebuilding with current KSUN + same SUSFS so the userspace
          # ksud (v3.2.0) stays ABI-stable.
          curl -fL --retry 3 --retry-max-time 120 \
            "https://gitlab.com/simonpunk/susfs4ksu/-/archive/kernel-4.14/susfs4ksu-kernel-4.14.tar.gz" \
            -o /tmp/susfs.tar.gz
          mkdir -p /tmp/susfs
          tar -xzf /tmp/susfs.tar.gz -C /tmp/susfs --strip-components=1
          # Verified via GitLab REST that kernel-4.14 path layout is:
          #   kernel_patches/fs/susfs.c            (and sus_su.c, no .h)
          #   kernel_patches/50_add_susfs_in_kernel-4.14.patch (1355 lines, 21 files)
          #   kernel_patches/include/linux/susfs.h   (and susfs_def.h, sus_su.h)
          #   kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch
          cp /tmp/susfs/kernel_patches/fs/susfs.c                       ./fs/
          cp /tmp/susfs/kernel_patches/fs/sus_su.c                      ./fs/
          cp /tmp/susfs/kernel_patches/include/linux/susfs.h            ./include/linux/
          cp /tmp/susfs/kernel_patches/include/linux/susfs_def.h        ./include/linux/
          cp /tmp/susfs/kernel_patches/include/linux/sus_su.h           ./include/linux/
          # Apply SUSFS<->KSUN glue patch into the integrated KSUN tree.
          if [[ -f /tmp/susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ]]; then
            cp /tmp/susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch \
              ./KernelSU-Next/
            ( cd ./KernelSU-Next && \
              patch --dry-run -p1 < 10_enable_susfs_for_ksu.patch >/dev/null && \
              patch -p1 < 10_enable_susfs_for_ksu.patch ) || true
            rm -f ./KernelSU-Next/10_enable_susfs_for_ksu.patch
          fi
          # Apply the upstream 50_add_susfs_in_kernel-4.14.patch into the tree
          # (covers fs/dcache.c, fs/namei.c, fs/namespace.c, fs/proc/*.c,
          # fs/stat.c, fs/statfs.c, kernel/kallsyms.c, kernel/sys.c, etc).
          # KBapna's branch already has SOME of these hooks baked in (verified:
          # fs/Makefile obj-y line + kernel/sys.c spoof_uname hook present).
          # --forward makes 'patch' idempotent: it skips already-applied hunks.
          cp /tmp/susfs/kernel_patches/50_add_susfs_in_kernel-4.14.patch ./50_add_susfs_in_kernel-4.14.upstream.patch
          patch --forward -p1 -d . < 50_add_susfs_in_kernel-4.14.upstream.patch || \
            echo "WARN: kernel-side SUSFS patch was not fully applicable; tree may have prior SUSFS diff."
          # Drop the upstream patch + any .orig backups.
          rm -f 50_add_susfs_in_kernel-4.14.upstream.patch
          find . -name '*.orig' -type f -delete 2>/dev/null || true
          rm -rf /tmp/susfs /tmp/susfs.tar.gz

      - name: Fix cam_utils include path (KBapna tree has missing -I'dir for cam_trace.c)
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          MK=drivers/media/platform/msm/camera/cam_utils/Makefile
          test -f "$MK"
          # cam_trace.c does `#define CREATE_TRACE_POINTS` and `#include "cam_trace.h"`.
          # At compile time, define_trace.h emits a quoted `#include "./cam_trace.h"`,
          # which gcc resolves relative to include/trace/ — and that path is NOT on -I.
          # cam_utils/Makefile lists -I flags for cam_core/ cam_req_mgr/ cam_smmu/, but
          # not for cam_utils/ itself. Add it before any existing ccflags-y line so the
          # the relative include resolves to the directory holding cam_trace.h.
          if ! grep -q 'cam_utils/$$' "$MK"; then
            sed -i '1i ccflags-y += -Idrivers/media/platform/msm/camera/cam_utils/' "$MK"
            echo "Patched $(wc -l < $MK) lines into $MK:"
            head -3 "$MK"
          fi

      - name: Drop -Werror from vendor drivers only (NOT top Makefile)
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          # Only strip -Werror from vendor Kbuild/Makefile files, NOT from the
          # top-level Makefile (which CONFIG_WERROR=n handles from .config).
          # GCC 12+ promotes -Wmaybe-uninitialized and -Wenum-int-mismatch to
          # errors in out-of-tree Qualcomm vendor drivers. Known offenders:
          #   drivers/staging/qcacld-3.0/Kbuild          — backported wifi
          #   techpack/audio/asoc/codecs/tfa98xx/Makefile — audio codec
          echo "=== Stripping -Werror from vendor Makefile/Kbuild files ==="
          find drivers/staging techpack -type f \( -name 'Makefile' -o -name 'Kbuild' \) \
            -exec grep -l '\-Werror' {} \; \
            -exec echo "  Stripping: {}" \; \
            -exec sed -i 's/-Werror//g' {} \;
          echo "=== Done ==="

      - name: Verify versions
        id: inspect
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          KSU_TAG=$(git -C KernelSU-Next describe --tags --always 2>/dev/null || echo v3.0.0)
          # Read the SUSFS_VERSION macro out of the freshly copied susfs.h
          SUSFS_VER=$(grep -E '^#define[[:space:]]+SUSFS_VERSION' include/linux/susfs.h 2>/dev/null \
                      | sed -E 's/.*"([^"]+)".*/\1/' | head -1)
          SUSFS_VER="${SUSFS_VER:-v1.5.5}"
          echo "ksud_version=$KSU_TAG" >> "$GITHUB_OUTPUT"
          echo "susfs_version=$SUSFS_VER" >> "$GITHUB_OUTPUT"
          # Truncate run duration estimates: ksud overlay+clone of KBapna can
          # add up. Surface the resolved versions to the runner log so the
          # build log records them even if the manifest writer fails later.
          echo "Resolved: ksu_tag=$KSU_TAG susfs_version=$SUSFS_VER"

      - name: Export build environment + SUSFS fragment
        run: |
          set -euo pipefail
          {
            echo "ARCH=arm64"
            echo "SUBARCH=arm64"
            echo "CROSS_COMPILE=aarch64-linux-gnu-"
          } >> "$GITHUB_ENV"
          # KBapna's defconfig is at arch/arm64/configs/phoenix_defconfig.
          cat "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/config/phoenix_v2.3.fragment" \
            >> "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/sources/KBapna/arch/arm64/configs/phoenix_defconfig"

      - name: make defconfig
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: make ARCH=arm64 phoenix_defconfig

      - name: make prepare
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: make ARCH=arm64 prepare

      - name: Compile kernel + dtbs
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: |
          set -euo pipefail
          # Two notes on flags:
          #   (1) GCC over clang: the upstream build uses gcc-aarch64-linux-gnu.
          #       Clang (LLVM=1) trips Qualcomm's cam_trace.h auto-generated
          #       header pipeline (the kernel's trace header machinery depends
          #       on GCC-specific -fstack-protector detection ordering that
          #       doesn't compose with LLVM=1). Sticking with GCC for stability.
          #   (2) -j2: ubuntu-latest runners have 2 cores and KBapna's tree has
          #       memory spikes during parallel drivers/ builds; -j2 avoids OOM.
          # Ensure build/ exists for tee log output
          mkdir -p build
          make -j2 ARCH=arm64 \
            Image.gz-dtb dtbs \
            |& tee build/kernel-build.log

      - name: Extract embedded kernel config
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: |
          set -euo pipefail
          mkdir -p build/out
          scripts/extract-ikconfig.sh arch/arm64/boot/Image.gz-dtb \
            > build/out/embedded.config || true

      - name: Run manifest scan
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        env:
          KSU_SOURCE_TAG: ${{ steps.inspect.outputs.ksud_version }}
          SUSFS_SOURCE_VERSION: ${{ steps.inspect.outputs.susfs_version }}
        run: bash "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/manifest/report.sh" "$PWD"

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-${{ github.run_number }}
          path: ${{ env.PROJECT_ROOT }}/build/sources/KBapna/arch/arm64/boot/Image.gz-dtb
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-log-${{ github.run_number }}
          path: ${{ env.PROJECT_ROOT }}/build/sources/KBapna/build/kernel-build.log
          retention-days: 14

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest-${{ github.run_number }}
          path: ${{ env.PROJECT_ROOT }}/build/sources/KBapna/build/manifest/MANIFEST.json
          retention-days: 30

  adb-pull:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.upload_target == 'gdrive' }}
    steps:
      - name: Wait for ADB connectivity
        run: |
          set -euo pipefail
          SERIAL="${{ github.event.inputs.adb_serial }}"
          # The ubuntu-latest runner does NOT have ADB access to your device.
          # This job exists as a placeholder for a self-hosted runner.
          # On your LAN, trigger the same workflow on a runner that has ADB.
          echo "NOTE: ADB pull requires a self-hosted Linux runner on the same LAN as the device."
          echo "Current runner: ${{ runner.name }} (${{ runner.os }})"
          exit 0
