# Build Phoenix KSUN v3.2.0-legacy / SUSFS kernel-4.14 full features

name: Build Phoenix KSUN v3.2.0-legacy / SUSFS kernel-4.14

on:
  workflow_dispatch:
    inputs:
      adb_serial:
        description: 'ADB serial of the device (e.g. 5b389e4c)'
        required: true
        type: string
      upload_target:
        description: 'Where to upload artifacts after build'
        required: false
        default: 'direct'
        type: choice
        options:
          - direct
          - gdrive

env:
  PROJECT_ROOT: projects/btc/ff

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install host build deps
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git rsync python3 python3-venv \
            libelf-dev libssl-dev liblz4-tool device-tree-compiler \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            cpio lz4 zip unzip bc patch

      - name: Fetch KBapna base at Unholy_KSUN+SUSFS (download ZIP)
        run: |
          set -euo pipefail
          # Download KBapna source as ZIP (much faster than git clone of 1.7 GB repo)
          curl -fL --retry 3 \
            "https://github.com/KBapna/Unholy_Phoenix_Redmi_K30_Kernel/archive/refs/heads/Unholy_KSUN+SUSFS.zip" \
            -o /tmp/kbapna-src.zip
          mkdir -p /tmp/kbapna-extracted
          echo "Extracting ZIP archive ..."
          unzip -qo /tmp/kbapna-src.zip -d /tmp/kbapna-extracted
          # The single top-level directory name from a GitHub branch ZIP varies
          # (especially with + in branch names). Resolve it dynamically.
          extracted_dir=$(find /tmp/kbapna-extracted -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -z "$extracted_dir" ]; then
            echo "::error::No directory found in extracted ZIP"
            ls -la /tmp/kbapna-extracted/
            exit 1
          fi
          echo "Extracted: $extracted_dir"
          mkdir -p "$PROJECT_ROOT/build/sources/KBapna"
          shopt -s dotglob
          mv "$extracted_dir"/* "$PROJECT_ROOT/build/sources/KBapna"/
          shopt -u dotglob
          rm -f /tmp/kbapna-src.zip
          rm -rf /tmp/kbapna-extracted
          cd "$PROJECT_ROOT/build/sources/KBapna"
          echo "=== arch/arm64/configs ==="
          ls -l arch/arm64/configs
          echo "=== phoenix_defconfig present: $([ -f arch/arm64/configs/phoenix_defconfig ] && echo YES || echo NO) ==="
          test -f arch/arm64/configs/phoenix_defconfig || {
            echo "::error::kbapna clone is missing arch/arm64/configs/phoenix_defconfig"
            exit 1
          }

      - name: Overlay KernelSU-Next v3.2.0-legacy via upstream setup.sh
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          if [[ -d KernelSU-Next ]]; then
            rm -rf KernelSU-Next
          fi
          # v3.2.0-legacy is the latest tag supporting non-GKI kernels (4.14+).
          # The regular v3.2.0 only supports GKI (5.10+).
          curl -fsSL \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/v3.2.0-legacy/kernel/setup.sh" \
            -o /tmp/ksun-setup.sh
          bash /tmp/ksun-setup.sh v3.2.0-legacy
          rm -f /tmp/ksun-setup.sh

      - name: Add SUSFS Kconfig entries to KernelSU-Next (restored after setup.sh overwrite)
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          KCONFIG="KernelSU-Next/kernel/Kconfig"
          echo "=== Checking KernelSU-Next Kconfig ==="
          test -f "$KCONFIG" || { echo "::error::Kconfig not found at $KCONFIG"; exit 1; }
          if grep -q 'config KSU_SUSFS' "$KCONFIG"; then
            echo "SUSFS Kconfig entries already present — skipping patch"
          else
            echo "=== Adding SUSFS Kconfig entries before endmenu ==="
            # Insert the SUSFS Kconfig menu entries just before the closing
            # endmenu line so olddefconfig recognizes CONFIG_KSU_SUSFS.
            sed -i '/^endmenu$/i\
menu "KernelSU - SUSFS"\
\
config KSU_SUSFS\
	bool "KernelSU addon - SUSFS"\
	depends on KSU\
	default y\
\
config KSU_SUSFS_HAS_MAGIC_MOUNT\
	bool "Magic mount support"\
	depends on KSU\
	default y\
\
config KSU_SUSFS_SUS_PATH\
	bool "Hide suspicious path"\
	depends on KSU_SUSFS\
	default y\
\
config KSU_SUSFS_SUS_MOUNT\
	bool "Hide suspicious mounts"\
	depends on KSU_SUSFS\
	default y\
\
config KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT\
	bool "Auto-hide KSU default mounts"\
	depends on KSU_SUSFS_SUS_MOUNT\
	default y\
\
config KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT\
	bool "Auto-hide bind mounts"\
	depends on KSU_SUSFS_SUS_MOUNT\
	default y\
\
config KSU_SUSFS_SUS_KSTAT\
	bool "Spoof kstat"\
	depends on KSU_SUSFS\
	default y\
\
config KSU_SUSFS_SUS_OVERLAYFS\
	bool "Spoof overlayfs kstat"\
	depends on KSU_SUSFS\
	default y\
\
config KSU_SUSFS_TRY_UMOUNT\
	bool "Try umount"\
	depends on KSU_SUSFS\
	default y\
\
config KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT\
	bool "Auto try-umount bind mounts"\
	depends on KSU_SUSFS_TRY_UMOUNT\
	default y\
\
config KSU_SUSFS_SPOOF_UNAME\
	bool "Spoof uname"\
	depends on KSU_SUSFS\
	default y\
\
config KSU_SUSFS_ENABLE_LOG\
	bool "Enable logging"\
	depends on KSU_SUSFS\
	default y\
\
config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS\
	bool "Hide kallsyms symbols"\
	depends on KSU_SUSFS\
	default y\
\
config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG\
	bool "Spoof cmdline/bootconfig"\
	depends on KSU_SUSFS\
	default y\
\
config KSU_SUSFS_OPEN_REDIRECT\
	bool "Open redirect"\
	depends on KSU_SUSFS\
	default y\
\
config KSU_SUSFS_SUS_MAP\
	bool "Hide suspicious maps"\
	depends on KSU_SUSFS\
	default y\
\
endmenu\
' "$KCONFIG"
            grep -q 'config KSU_SUSFS' "$KCONFIG" && \
              echo "SUSFS Kconfig entries added successfully" || \
              { echo "::error::SUSFS Kconfig insertion failed"; exit 1; }
          fi

      - name: Backport kernel 4.14 compat layer for KSUN v3.2.0-legacy APIs
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          echo "=== Applying KSUN v3.2.0-legacy kernel 4.14 compatibility layer ==="
          # 1. Copy the compat header into drivers/kernelsu/
          cp "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/patches/ksu_compat.h" \
            drivers/kernelsu/ksu_compat.h
          # 1b. Copy SUSFS compat source (provides susfs_is_current_ksu_domain,
          #     susfs_is_current_zygote_domain, ksu_try_umount, etc.)
          cp "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/patches/ksu_susfs_compat.c" \
            drivers/kernelsu/susfs_compat.c
          # 2. Replace LKM-style Makefile with built-in Makefile for kernel 4.14
          #    The upstream v3.2.0-legacy kernel/Makefile is designed for
          #    external-module (LKM) compilation (make ... M=$(MDIR) modules).
          #    When drivers/Makefile has obj-$(CONFIG_KSU) += kernelsu/ for
          #    built-in mode, that LKM Makefile produces NO objects — causing
          #    vmlinux link failures for ksu_input_hook and all other KSUN
          #    symbols.  Our replacement lists every .c file explicitly via
          #    kernelsu-y and compiles them all into kernelsu.o.
          cp "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/patches/ksun_v3_makefile" \
            drivers/kernelsu/Makefile
          echo "Replaced KSUN Makefile with built-in version for kernel 4.14"
          # 3. Delete Kbuild — it takes priority over Makefile and has a fail-fast
          #    hook check (ksu_handle_sys_reboot in kernel/reboot.c) that the KBapna
          #    tree doesn't satisfy. Our built-in Makefile handles all compilation.
          rm -f drivers/kernelsu/Kbuild
          echo "Removed KSUN Kbuild (Makefile now takes priority)"
          # 4. Create <linux/pgtable.h> stub (5.9+ header not present on 4.14)
          cp "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/patches/ksu_compat_pgtable.h" \
            include/linux/pgtable.h 2>/dev/null || touch include/linux/pgtable.h
          echo "Created include/linux/pgtable.h -> asm/pgtable.h alias"
          # 4. Scan for remaining incompatibilities
          DK="drivers/kernelsu"
          echo "=== Scanning for remaining 4.14-incompatible references ==="
          for f in "$DK"/*.c "$DK"/*.h; do
            [ -f "$f" ] || continue
            issues=""
            grep -q 'linux/refcount.h' "$f" 2>/dev/null && issues="$issues refcount.h"
            grep -q 'linux/xxhash.h' "$f" 2>/dev/null && issues="$issues xxhash.h"
            grep -q 'linux/sched/mm.h' "$f" 2>/dev/null && issues="$issues sched/mm.h"
            grep -q 'linux/pgtable.h' "$f" 2>/dev/null && issues="$issues pgtable.h"
            if [ -n "$issues" ]; then
              echo "  UNRESOLVED in $(basename $f):$issues"
            fi
          done
          echo "=== Compat layer applied ==="

      - name: Update SUSFS header CMD defines (only susfs_def.h)
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          SUSFS_V2_DIR="$GITHUB_WORKSPACE/$PROJECT_ROOT/build/patches/susfs_v2"
          echo "=== Updating SUSFS CMD defines (keeping original v1.5.5 susfs.h) ==="

          # 1. Only copy susfs_def.h (CMD_* codes).  Do NOT copy susfs.h from the
          #    v2 package — it wraps struct definitions in CONFIG_* guards AND has
          #    incompatible struct layouts (e.g. target_ino at offset 0), which
          #    breaks compilation against the v1.5.5 fs/susfs.c.  The v1.5.5
          #    susfs.h provides the correct struct layouts for the compat shim.
          cp -v "$SUSFS_V2_DIR/susfs_def.h" include/linux/susfs_def.h \
            || echo "WARN: susfs_def.h copy failed"
          echo "susfs_def.h updated with v2 CMD codes"
          echo "Keeping original KBapna v1.5.5 susfs.h (struct layouts unchanged)"

      - name: Patch KSUN supercall.c to forward SUSFS magic to susfs_handle_sys_reboot
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          echo "=== Applying SUSFS supercall forward patch ==="
          patch -p1 --forward --batch \
            -i "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/patches/susfs_supercall_forward.patch" \
            -r /dev/null 2>&1 || true
          # Verify the patch was applied
          if grep -q '0xFAFAFAFA' KernelSU-Next/kernel/supercall/supercall.c; then
            echo "SUSFS supercall forward patch applied successfully"
          else
            echo "WARN: SUSFS magic not found in supercall.c — patch may have failed"
            grep -n 'magic1' KernelSU-Next/kernel/supercall/supercall.c || true
          fi

      - name: Fix cam_utils include path (KBapna tree has missing -I'dir for cam_trace.c)
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          MK=drivers/media/platform/msm/camera/cam_utils/Makefile
          test -f "$MK"
          # cam_trace.c does `#define CREATE_TRACE_POINTS` and `#include "cam_trace.h"`.
          # At compile time, define_trace.h emits a quoted `#include "./cam_trace.h"`,
          # which gcc resolves relative to include/trace/ — and that path is NOT on -I.
          # cam_utils/Makefile lists -I flags for cam_core/ cam_req_mgr/ cam_smmu/, but
          # not for cam_utils/ itself. Add it before any existing ccflags-y line so the
          # the relative include resolves to the directory holding cam_trace.h.
          if ! grep -q 'cam_utils/$$' "$MK"; then
            sed -i '1i ccflags-y += -Idrivers/media/platform/msm/camera/cam_utils/' "$MK"
            echo "Patched $(wc -l < $MK) lines into $MK:"
            head -3 "$MK"
          fi

      - name: Drop -Werror from vendor drivers only (NOT top Makefile)
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          # Only strip -Werror from vendor Kbuild/Makefile files, NOT from the
          # top-level Makefile (which CONFIG_WERROR=n handles from .config).
          # GCC 12+ promotes -Wmaybe-uninitialized and -Wenum-int-mismatch to
          # errors in out-of-tree Qualcomm vendor drivers. Known offenders:
          #   drivers/staging/qcacld-3.0/Kbuild          — backported wifi
          #   techpack/audio/asoc/codecs/tfa98xx/Makefile — audio codec
          echo "=== Stripping -Werror from vendor Makefile/Kbuild files ==="
          find drivers/staging techpack -type f \( -name 'Makefile' -o -name 'Kbuild' \) \
            -exec grep -l '\-Werror' {} \; \
            -exec echo "  Stripping: {}" \; \
            -exec sed -i 's/-Werror//g' {} \;
          echo "=== Done ==="

      - name: Fetch AnyKernel3 tools (busybox, magiskboot, magiskpolicy)
        run: |
          set -euo pipefail
          AK3_TOOLS_DIR="$PROJECT_ROOT/build/packaging/ak3/tools"
          mkdir -p "$AK3_TOOLS_DIR"
          # Download tools from osm0sis/AnyKernel3 official repo
          AK3_REPO="https://raw.githubusercontent.com/osm0sis/AnyKernel3/master"
          for tool in busybox magiskboot magiskpolicy; do
            echo "Downloading $tool ..."
            curl -fL --retry 3 "$AK3_REPO/tools/$tool" -o "$AK3_TOOLS_DIR/$tool"
            chmod +x "$AK3_TOOLS_DIR/$tool"
          done
          echo "=== AK3 tools ==="
          ls -lh "$AK3_TOOLS_DIR/"

      - name: Verify versions
        id: inspect
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT/build/sources/KBapna"
          KSU_TAG=$(git -C KernelSU-Next describe --tags --always 2>/dev/null || echo "v3.2.0-legacy")
          # Read the SUSFS_VERSION macro from the installed susfs.h
          SUSFS_VER=$(grep -E '^#define[[:space:]]+SUSFS_VERSION' include/linux/susfs.h 2>/dev/null \
                      | sed -E 's/.*"([^"]+)".*/\1/' | head -1)
          SUSFS_VER="${SUSFS_VER:-v1.5.5}"
          # Determine if we're using the new kernel-4.14 branch or the old backport
          if grep -q 'susfs_sus_ino_for_show_map_vma' fs/susfs.c 2>/dev/null; then
            SUSFS_BRANCH="kernel-4.14"
          else
            SUSFS_BRANCH="backported"
          fi
          echo "ksud_version=$KSU_TAG" >> "$GITHUB_OUTPUT"
          echo "susfs_version=${SUSFS_VER} (${SUSFS_BRANCH})" >> "$GITHUB_OUTPUT"
          echo "Resolved: ksu_tag=$KSU_TAG susfs_version=$SUSFS_VER branch=$SUSFS_BRANCH"

      - name: Export build environment + SUSFS fragment
        run: |
          set -euo pipefail
          {
            echo "ARCH=arm64"
            echo "SUBARCH=arm64"
            echo "CROSS_COMPILE=aarch64-linux-gnu-"
          } >> "$GITHUB_ENV"
          # KBapna's defconfig is at arch/arm64/configs/phoenix_defconfig.
          cat "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/config/phoenix_v2.3.fragment" \
            >> "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/sources/KBapna/arch/arm64/configs/phoenix_defconfig"

      - name: make defconfig
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: make ARCH=arm64 phoenix_defconfig

      - name: make prepare
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: make ARCH=arm64 prepare

      - name: Compile kernel + dtbs
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: |
          set -euo pipefail
          # Two notes on flags:
          #   (1) GCC over clang: the upstream build uses gcc-aarch64-linux-gnu.
          #       Clang (LLM=1) trips Qualcomm's cam_trace.h auto-generated
          #       header pipeline (the kernel's trace header machinery depends
          #       on GCC-specific -fstack-protector detection ordering that
          #       doesn't compose with LLM=1). Sticking with GCC for stability.
          #   (2) -j2: ubuntu-latest runners have 2 cores and KBapna's tree has
          #       memory spikes during parallel drivers/ builds; -j2 avoids OOM.
          # Ensure build/ exists for tee log output
          mkdir -p build
          make -j2 ARCH=arm64 \
            Image.gz-dtb dtbs \
            |& tee build/kernel-build.log

      - name: Extract embedded kernel config
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        run: |
          set -euo pipefail
          mkdir -p build/out
          scripts/extract-ikconfig.sh arch/arm64/boot/Image.gz-dtb \
            > build/out/embedded.config || true

      - name: Run manifest scan
        working-directory: ${{ env.PROJECT_ROOT }}/build/sources/KBapna
        env:
          KSU_SOURCE_TAG: ${{ steps.inspect.outputs.ksud_version }}
          SUSFS_SOURCE_VERSION: ${{ steps.inspect.outputs.susfs_version }}
        run: bash "$GITHUB_WORKSPACE/$PROJECT_ROOT/build/manifest/report.sh" "$PWD"

      - name: Package AnyKernel3 flashable ZIP
        run: |
          set -euo pipefail
          KERNEL_SRC="$PROJECT_ROOT/build/sources/KBapna/arch/arm64/boot/Image.gz-dtb"
          AK3_SRC="$GITHUB_WORKSPACE/$PROJECT_ROOT/build/packaging/ak3"
          OUT_DIR="$GITHUB_WORKSPACE/$PROJECT_ROOT/build/out"
          ZIP_NAME="Unholy_Phoenix_KSUN-v3.2.0-legacy_SUSFS-k414-phoenix-${{ github.run_number }}.zip"
          test -f "$KERNEL_SRC" || { echo "::error::Image.gz-dtb not found at $KERNEL_SRC"; exit 1; }
          test -f "$AK3_SRC/anykernel.sh" || { echo "::error::anykernel.sh not found"; exit 1; }
          mkdir -p "$OUT_DIR"
          rm -rf /tmp/ak3-package
          cp -r "$AK3_SRC" /tmp/ak3-package
          chmod -R u+w /tmp/ak3-package
          cp "$KERNEL_SRC" /tmp/ak3-package/Image.gz-dtb
          cd /tmp/ak3-package
          # Standard AnyKernel3 zip: store (no compression for boot images)
          zip -r -0 "$OUT_DIR/$ZIP_NAME" . \
            -x ".*" -x "*/.*"
          echo "=== AnyKernel3 ZIP created ==="
          ls -lh "$OUT_DIR/$ZIP_NAME"
          echo "zip_path=$OUT_DIR/$ZIP_NAME" >> "$GITHUB_ENV"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-${{ github.run_number }}
          path: ${{ env.PROJECT_ROOT }}/build/sources/KBapna/arch/arm64/boot/Image.gz-dtb
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-log-${{ github.run_number }}
          path: ${{ env.PROJECT_ROOT }}/build/sources/KBapna/build/kernel-build.log
          retention-days: 14

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest-${{ github.run_number }}
          path: ${{ env.PROJECT_ROOT }}/build/sources/KBapna/build/manifest/MANIFEST.json
          retention-days: 30

      - name: Upload AnyKernel3 flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: anykernel3-${{ github.run_number }}
          path: ${{ env.PROJECT_ROOT }}/build/out/Unholy_Phoenix_KSUN-v3.2.0-legacy_SUSFS-k414-phoenix-${{ github.run_number }}.zip
          retention-days: 30

  adb-pull:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.upload_target == 'gdrive' }}
    steps:
      - name: Wait for ADB connectivity
        run: |
          set -euo pipefail
          SERIAL="${{ github.event.inputs.adb_serial }}"
          # The ubuntu-latest runner does NOT have ADB access to your device.
          # This job exists as a placeholder for a self-hosted runner.
          # On your LAN, trigger the same workflow on a runner that has ADB.
          echo "NOTE: ADB pull requires a self-hosted Linux runner on the same LAN as the device."
          echo "Current runner: ${{ runner.name }} (${{ runner.os }})"
          exit 0
